<!DOCTYPE html>
<html lang="en-us">

<head>
    <base href="https://gcore.jsdelivr.net/gh/marty-games/mga-unityx@main/fears-to-fathom-home-alone/">

    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />

    <meta name="viewport"
        content="width=device-width, height=device-height, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <title>Fears To Fathom: Home Alone</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: black;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            font-family: Arial, sans-serif;
            color: white;
        }

        /* BACKGROUND */

        #bg-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: black;
        }

        /* LOADER */

        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 22px;
            z-index: 5;
        }

        #title {
            font-size: 3em;
            font-weight: bold;
            text-align: center;

            text-shadow:
                0 0 5px #0ff,
                0 0 10px #0ff,
                0 0 20px #0ff,
                0 0 30px #0ff;
        }

        /* PROGRESS BAR */

        #progress-bar {
            width: 420px;
            max-width: 85vw;
            height: 12px;

            background: #111;
            border-radius: 10px;
            overflow: hidden;

            box-shadow:
                0 0 3px #0ff,
                0 0 8px rgba(0, 255, 255, .4);
        }

        #progress-fill {
            width: 0%;
            height: 100%;

            background: #0ff;
            border-radius: 10px;

            box-shadow:
                0 0 4px #0ff,
                0 0 10px rgba(0, 255, 255, .6);

            transition: width .25s;
        }

        #loading-text {
            font-size: 18px;

            text-shadow:
                0 0 4px #fff,
                0 0 8px #fff;
        }

        /* UNITY */

        .webgl-content {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        #unityContainer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: none;
        }
    </style>

    <script src="Build/UnityLoader.js"></script>
</head>

<body>

    <!-- PARTICLE BACKGROUND -->

    <canvas id="bg-canvas"></canvas>

    <!-- LOADER -->

    <div id="loader">

        <div id="title">
            Fears To Fathom
        </div>

        <div id="progress-bar">
            <div id="progress-fill"></div>
        </div>

        <div id="loading-text">
            Preparing files...
        </div>

    </div>

    <!-- UNITY -->

    <div class="webgl-content">
        <div id="unityContainer"></div>
    </div>

    <script>
        /* PARTICLE BACKGROUND */

        const canvasBG = document.getElementById("bg-canvas");
        const ctx = canvasBG.getContext("2d");

        const MAX_PARTICLES = 50;
        const MAX_DISTANCE = 100;

        const COLORS = [
            "#00ffff",
            "#ff00ff",
            "#ffff00",
            "#00ff00",
            "#ff0080"
        ];

        let particles = [];
        let animationId;

        function initBackground() {

            canvasBG.width = window.innerWidth;
            canvasBG.height = window.innerHeight;

            particles = [];

            for (let i = 0; i < MAX_PARTICLES; i++) {

                particles.push({

                    x: Math.random() * canvasBG.width,
                    y: Math.random() * canvasBG.height,

                    size: Math.random() * 3 + 1,

                    speedX: (Math.random() - 0.5) * 1.2,
                    speedY: (Math.random() - 0.5) * 1.2,

                    color: COLORS[Math.floor(Math.random() * COLORS.length)]

                });

            }

        }

        function drawConnections() {

            for (let a = 0; a < particles.length; a++) {

                for (let b = a + 1; b < particles.length; b++) {

                    const dx = particles[a].x - particles[b].x;
                    const dy = particles[a].y - particles[b].y;

                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < MAX_DISTANCE) {

                        ctx.beginPath();

                        const color = particles[a].color;

                        ctx.strokeStyle = color;

                        ctx.globalAlpha =
                            0.5 - distance / (2 * MAX_DISTANCE);

                        ctx.moveTo(
                            particles[a].x,
                            particles[a].y
                        );

                        ctx.lineTo(
                            particles[b].x,
                            particles[b].y
                        );

                        ctx.shadowBlur = 10;
                        ctx.shadowColor = color;

                        ctx.stroke();

                        ctx.globalAlpha = 1;

                    }

                }

            }

        }

        function animateBackground() {

            ctx.clearRect(
                0,
                0,
                canvasBG.width,
                canvasBG.height
            );

            particles.forEach(p => {

                p.x += p.speedX;
                p.y += p.speedY;

                if (p.x < 0 || p.x > canvasBG.width)
                    p.speedX *= -1;

                if (p.y < 0 || p.y > canvasBG.height)
                    p.speedY *= -1;

                ctx.beginPath();

                ctx.arc(
                    p.x,
                    p.y,
                    p.size,
                    0,
                    Math.PI * 2
                );

                ctx.fillStyle = p.color;

                ctx.shadowColor = p.color;
                ctx.shadowBlur = 8;

                ctx.fill();

            });

            drawConnections();

            animationId = requestAnimationFrame(
                animateBackground
            );

        }

        window.addEventListener("resize", initBackground);

        initBackground();
        animateBackground();

        /* LOADER */

        const loadingText =
            document.querySelector("#loading-text");

        const progressFill =
            document.querySelector("#progress-fill");

        let max = 0;
        let done = 0;

        function updateProgress() {

            let percent = (done / max) * 100;

            progressFill.style.width =
                percent + "%";

            loadingText.textContent =
                `Loading files... (${done}/${max})`;

        }

        function mergeFiles(fileParts) {

            return new Promise((resolve, reject) => {

                let buffers = [];

                function fetchPart(index) {

                    if (index >= fileParts.length) {

                        let mergedBlob =
                            new Blob(buffers);

                        let mergedFileUrl =
                            URL.createObjectURL(
                                mergedBlob
                            );

                        resolve(mergedFileUrl);

                        return;

                    }

                    fetch(fileParts[index])

                        .then((response) =>
                            response.arrayBuffer()
                        )

                        .then((data) => {

                            buffers.push(data);

                            done++;

                            updateProgress();

                            fetchPart(index + 1);

                        })

                        .catch(reject);

                }

                fetchPart(0);

            });

        }

        function getParts(file, start, end) {

            let parts = [];

            for (let i = start; i <= end; i++) {

                parts.push(
                    file + ".part" + i
                );

            }

            max += (end - start + 1);

            return parts;

        }

        function resizeUnityContainer() {

            const container =
                document.getElementById(
                    "unityContainer"
                );

            container.style.width =
                window.innerWidth + "px";

            container.style.height =
                window.innerHeight + "px";

        }

        Promise.all([

            mergeFiles(
                getParts(
                    "Build/FTFHAPort.data.unityweb",
                    1,
                    39
                )
            ),

        ]).then(([dataUrl]) => {

            const json = {

                companyName: "Rayll",

                productName:
                    "Fears To Fathom",

                dataUrl: dataUrl,

                wasmCodeUrl:
                    "FTFHAPort.wasm.code.unityweb",

                wasmFrameworkUrl:
                    "FTFHAPort.wasm.framework.unityweb",

                TOTAL_MEMORY: 536870912,

                graphicsAPI: [
                    "WebGL 2.0",
                    "WebGL 1.0"
                ],

                webglContextAttributes: {
                    preserveDrawingBuffer: false
                },

                splashScreenStyle: "Dark",

                backgroundColor: "#231F20",

                cacheControl: {
                    default: "must-revalidate"
                },

            };

            let blob = new Blob(
                [JSON.stringify(json)],
                {
                    type: "application/json",
                }
            );

            let blobUrl =
                URL.createObjectURL(blob);

            window.addEventListener(
                "resize",
                resizeUnityContainer
            );

            UnityLoader.instantiate(
                "unityContainer",
                json,
                {
                    url: blobUrl,

                    Module: {

                        onRuntimeInitialized: function () {

                            resizeUnityContainer();

                            document.getElementById(
                                "loader"
                            ).style.display = "none";

                            cancelAnimationFrame(
                                animationId
                            );

                            canvasBG.style.display =
                                "none";

                            document.getElementById(
                                "unityContainer"
                            ).style.display = "block";

                        },

                    },

                }
            );

        });
    </script>

</body>

</html>
