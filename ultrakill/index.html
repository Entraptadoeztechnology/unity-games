<!DOCTYPE html>
<html lang="en-us">

<head>
    <base href="https://cdn.jsdelivr.net/gh/marty-games/mga-unity@main/ultrakill/">
    <meta charset="utf-8">
    <title>ULTRAKILL</title>

    <style>
        /* background */
        #bg-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: -2;
        }

        body {
            margin: 0;
            height: 100vh;
            font-family: Arial, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* loader */
        #loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 22px;
            z-index: 2;
        }

        #title {
            font-size: 3em;
            font-weight: bold;
            text-shadow:
                0 0 5px #0ff,
                0 0 10px #0ff,
                0 0 20px #0ff,
                0 0 30px #0ff;
        }

        #progress-bar {
            width: min(90vw, 420px);
            height: 12px;
            background: #111;
            border-radius: 10px;
            box-shadow: 0 0 3px #0ff, 0 0 8px rgba(0, 255, 255, .4);
        }

        #progress-fill {
            height: 100%;
            width: 0%;
            background: #0ff;
            border-radius: 10px;
            box-shadow: 0 0 4px #0ff, 0 0 10px rgba(0, 255, 255, .6);
            transition: width .25s;
        }

        #loading-text {
            font-size: 18px;
            text-shadow: 0 0 4px #fff, 0 0 8px #fff;
        }

        /* unity */
        #unity-container {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            display: none;
        }

        #unity-canvas {
            width: 100%;
            height: 100%;
            background: black;
        }
    </style>
</head>

<body>

    <canvas id="bg-canvas"></canvas>

    <div id="loader">
        <div id="title">ULTRAKILL</div>

        <div id="progress-bar">
            <div id="progress-fill"></div>
        </div>

        <div id="loading-text">Preparing files...</div>
    </div>

    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>
    </div>

    <script>
        /* PARTICLES */
        const canvasBG = document.getElementById("bg-canvas");
        const ctx = canvasBG.getContext("2d");

        const particles = [];
        const MAX = 50;
        const DIST = 100;

        function initBG() {
            canvasBG.width = window.innerWidth;
            canvasBG.height = window.innerHeight;

            particles.length = 0;

            for (let i = 0; i < MAX; i++) {
                particles.push({
                    x: Math.random() * canvasBG.width,
                    y: Math.random() * canvasBG.height,
                    vx: (Math.random() - 0.5),
                    vy: (Math.random() - 0.5),
                    size: Math.random() * 3 + 1
                });
            }
        }

        function drawBG() {
            ctx.clearRect(0, 0, canvasBG.width, canvasBG.height);

            for (let p of particles) {
                p.x += p.vx;
                p.y += p.vy;

                if (p.x < 0 || p.x > canvasBG.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvasBG.height) p.vy *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = "#0ff";
                ctx.shadowColor = "#0ff";
                ctx.shadowBlur = 8;
                ctx.fill();
            }

            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    let dx = particles[i].x - particles[j].x;
                    let dy = particles[i].y - particles[j].y;
                    let d = Math.sqrt(dx * dx + dy * dy);

                    if (d < DIST) {
                        ctx.strokeStyle = `rgba(0,255,255,${0.5 - d / 200})`;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }

            requestAnimationFrame(drawBG);
        }

        window.addEventListener("resize", initBG);
        initBG();
        drawBG();

        /* LOADING SYSTEM */
        const progressFill = document.getElementById("progress-fill");
        const loadingText = document.getElementById("loading-text");

        let totalBytes = 0;
        let loadedBytes = 0;

        function formatMB(bytes) {
            return (bytes / (1024 * 1024)).toFixed(2);
        }

        async function fetchWithProgress(url) {
            const response = await fetch(url);
            const reader = response.body.getReader();

            let chunks = [];
            let received = 0;

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                received += value.length;
                loadedBytes += value.length;

                chunks.push(value);

                let percent = (loadedBytes / totalBytes) * 100;

                progressFill.style.width = percent + "%";
                loadingText.textContent =
                    `Loading ${formatMB(loadedBytes)} / ${formatMB(totalBytes)} MB (${percent.toFixed(0)}%)`;
            }

            let buffer = new Uint8Array(received);
            let offset = 0;

            for (let chunk of chunks) {
                buffer.set(chunk, offset);
                offset += chunk.length;
            }

            return buffer.buffer;
        }

        function getParts(file, start, end) {
            let parts = [];
            for (let i = start; i <= end; i++) {
                parts.push(file + ".part" + i);
            }
            return parts;
        }

        async function mergeFiles(parts) {
            const buffers = await Promise.all(parts.map(fetchWithProgress));
            return URL.createObjectURL(new Blob(buffers));
        }

        /* UNITY START */
        (async () => {

            const dataParts = getParts("Build/ultrakill.data.unityweb", 1, 4);
            const wasmParts = getParts("Build/ultrakill.wasm.unityweb", 1, 2);

            totalBytes = 98000000;

            const [dataUrl, wasmUrl] = await Promise.all([
                mergeFiles(dataParts),
                mergeFiles(wasmParts)
            ]);

            const canvas = document.getElementById("unity-canvas");

            const script = document.createElement("script");
            script.src = "Build/ultrakill.loader.js";

            script.onload = () => {
                createUnityInstance(canvas, {
                    dataUrl,
                    frameworkUrl: "Build/ultrakill.framework.js.unityweb",
                    codeUrl: wasmUrl,
                    streamingAssetsUrl: "StreamingAssets",
                    companyName: "Hakita and Cake Logic",
                    productName: "ULTRAKILL",
                    productVersion: "1.4"
                }).then(() => {

                    document.getElementById("loader").style.display = "none";
                    document.getElementById("bg-canvas").style.display = "none";
                    document.getElementById("unity-container").style.display = "block";

                });
            };

            document.body.appendChild(script);

        })();
    </script>

</body>
</html
